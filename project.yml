name: CineSaver
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    macOS: "13.0"
settings:
  base:
    SWIFT_VERSION: 5.9
configs:
  Debug: debug
  Release: release
targets:
  CineSaverHost:
    type: application
    platform: macOS
    sources:
      - path: VideoSaverHost
    info:
      path: Config/CineSaverHost-Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.cinesaver.host
        INFOPLIST_KEY_NSAppleEventsUsageDescription: VideoSaver needs this for optional install automation.
    entitlements:
      path: Config/CineSaverHost.entitlements
    dependencies:
      - target: CineSaver

  CineSaver:
    type: bundle
    platform: macOS
    sources:
      - path: VideoSaver
      - path: VideoSaverHost/Shared
    info:
      path: Config/CineSaver-Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.cinesaver
        PRODUCT_NAME: CineSaver
        WRAPPER_EXTENSION: saver
        MACH_O_TYPE: mh_bundle
        PRODUCT_MODULE_NAME: CineSaver
        CODE_SIGN_STYLE: Automatic
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @loader_path/../Frameworks"
    entitlements:
      path: Config/CineSaver.entitlements
    dependencies:
      - framework: ScreenSaver.framework
      - framework: AVFoundation.framework
